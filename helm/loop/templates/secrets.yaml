apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: loop
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  encryptionKey: {{ .Values.global.encryptionKey | b64enc | quote }}
  jwtSecret: {{ .Values.global.jwtSecret | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db-secret
  labels:
    app.kubernetes.io/name: loop
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  password: {{ .Values.postgresql.auth.password | b64enc | quote }}
