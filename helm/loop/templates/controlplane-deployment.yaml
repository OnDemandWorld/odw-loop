{{- if .Values.controlPlane.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-control-plane
  labels:
    app.kubernetes.io/name: loop-control-plane
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.controlPlane.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: loop-control-plane
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loop-control-plane
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: control-plane
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          ports:
            - containerPort: 3001
              protocol: TCP
          env:
            - name: LOOP_ENV
              value: {{ .Values.global.environment | quote }}
            - name: LOOP_DB_HOST
              value: "{{ .Release.Name }}-postgresql"
            - name: LOOP_DB_PORT
              value: "5432"
            - name: LOOP_DB_NAME
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: LOOP_DB_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: LOOP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-db-secret
                  key: password
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
{{- end }}
