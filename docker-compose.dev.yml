# Development — Docker Compose with hot reload
version: '3.8'

services:
  loop-app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
      target: builder
    volumes:
      - .:/app
      - /app/node_modules
    command: pnpm dev
    ports:
      - "3000:3000"
    environment:
      - LOOP_ENV=development
      - LOOP_LOG_LEVEL=debug
      - LOOP_DB_TYPE=sqlite
      - LOOP_DB_PATH=./data/loop.db
      - LOOP_DATA_DIR=./data
      - LOOP_ENCRYPTION_KEY=dev-key-change-me-please-32chars!
      - LOOP_JWT_SECRET=dev-jwt-secret-change-me
    depends_on:
      - loop-sandbox

  loop-sandbox:
    build:
      context: .
      dockerfile: docker/Dockerfile.sandbox
    volumes:
      - ./apps/sandbox:/opt/sandbox
    environment:
      - LOOP_SANDBOX_MEMORY_MB=256
      - LOOP_SANDBOX_CPU_SECONDS=30

  loop-canvas:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
      target: builder
    working_dir: /app/apps/canvas
    command: pnpm dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
